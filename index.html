<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exquisite Jewels | Pago Seguro 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <style>
        :root { --oro: #d4af37; --negro: #111; --wsp: #25d366; --yape: #74226c; --yape-azul: #00aae4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; text-align: center; }
        
        header { background: var(--negro); color: #fff; padding: 50px 20px; border-bottom: 5px solid var(--oro); }
        h1 { font-size: 3rem; margin: 0; color: var(--oro); letter-spacing: 4px; }

        .container { max-width: 1100px; margin: auto; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        
        .card { border: 2px solid var(--oro); border-radius: 15px; overflow: hidden; padding-bottom: 20px; transition: 0.3s; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .price { font-size: 2rem; color: var(--oro); font-weight: bold; display: block; margin: 15px 0; }

        .btn-abrir-qr { 
            background: var(--yape-azul); color: white; border: none; padding: 15px 25px; 
            font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.1rem; width: 85%;
        }

        /* VENTANA EMERGENTE (MODAL) */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);
        }
        .modal-content {
            background: white; margin: 5% auto; padding: 25px; border-radius: 20px;
            width: 90%; max-width: 350px; border: 5px solid var(--yape); position: relative;
        }
        .close { position: absolute; right: 15px; top: 5px; font-size: 35px; cursor: pointer; color: #999; font-weight: bold; }
        
        /* TU IMAGEN QR ACTUALIZADA */
        .qr-img-real { 
            width: 100%; 
            max-width: 250px; 
            margin: 15px auto; 
            display: block;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .wsp-fijo { position: fixed; bottom: 25px; right: 25px; background: var(--wsp); color: white; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-decoration: none; z-index: 1000; }

        footer { background: var(--negro); color: white; padding: 40px; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <h1>EXQUISITE JEWELS</h1>
    <p>JOYERÍA DE LUJO • 2026</p>
</header>

<div class="container">
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com" alt="Collar">
            <h2>COLLARES</h2>
            <span class="price">S/ 450.00</span>
            <button class="btn-abrir-qr" onclick="mostrarQR()">PAGAR POR YAPE</button>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com" alt="Anillo">
            <h2>ANILLOS</h2>
            <span class="price">S/ 1,200.00</span>
            <button class="btn-abrir-qr" onclick="mostrarQR()">PAGAR POR YAPE</button>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com" alt="Pulsera">
            <h2>PULSERAS</h2>
            <span class="price">S/ 680.00</span>
            <button class="btn-abrir-qr" onclick="mostrarQR()">PAGAR POR YAPE</button>
        </div>
    </div>
</div>

<!-- VENTANA CON TU QR PERSONALIZADO -->
<div id="miModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarQR()">&times;</span>
        <h2 style="color: var(--yape); margin: 0; font-size: 1.8rem;">YAPE AQUÍ</h2>
        <p style="color: #666; font-size: 0.9rem; margin-top: 5px;">Escanea el código para pagar</p>
        
        <!-- IMAGEN DEL QR QUE ENVIASTE -->
        <img src="https://i.ibb.co" class="qr-img-real" alt="QR Yape Exquisite Jewels">
        
        <div style="font-size: 2rem; font-weight: 900; color: var(--yape); margin: 10px 0;">974848347</div>
        <p style="font-weight: bold; margin-bottom: 15px; font-size: 0.9rem;">¡Luego envíanos tu captura!</p>
        
        <a href="https://api.whatsapp.com! Aquí envío mi comprobante de pago de Exquisite Jewels" target="_blank" style="background: var(--wsp); color: white; text-decoration: none; padding: 15px; display: block; border-radius: 12px; font-weight: bold; font-size: 1.1rem;">
            <i class="bi bi-whatsapp"></i> ENVIAR CAPTURA
        </a>
    </div>
</div>

<a href="https://api.whatsapp.com" class="wsp-fijo" target="_blank">
    <i class="bi bi-whatsapp"></i>
</a>

<footer>
    <p>📍 Mariscal Castilla 721</p>
    <p>📱 WhatsApp Central: 974848347</p>
    <p>&copy; 2026 <b>EXQUISITE JEWELS</b></p>
</footer>

<script>
    function mostrarQR() {
        document.getElementById("miModal").style.display = "block";
    }
    function cerrarQR() {
        document.getElementById("miModal").style.display = "none";
    }
    window.onclick = function(event) {
        if (event.target == document.getElementById("miModal")) {
            cerrarQR();
        }
    }
</script>

</body>
</html>
